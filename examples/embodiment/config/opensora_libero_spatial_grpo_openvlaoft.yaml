defaults:
  - env/opensora_libero_spatial@env.train
  - env/libero_spatial@env.eval
  - model/openvla_oft@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: wm_rl
    experiment_name: "libero_spatial_grpo_openvlaoft"
    logger_backends: ["tensorboard", "wandb"] # wandb, swanlab

  max_epochs: 1000
  max_steps: -1

  only_eval: False
  val_check_interval: -1 # 训练过程中不做评估
  save_interval: 25 # save checkpoint every 25 steps

  resume_dir: null # Optional: path to a saved checkpoint directory, such as 'checkpoints/global_step_10'. If not None, it will be used to resume training.
  ckpt_path: null  # Optional: path to a .pt checkpoint. If not None, it will be loaded after the model is instantiated (for evaluation).

algorithm:
  normalize_advantages: True
  kl_penalty: kl  # how to estimate kl divergence: kl or kl_penalty
  group_size: 8
  rollout_epoch: 16 
  # num_action_chunk = 8, action_dim = 7 (set in openvla_oft.yaml)
  eval_rollout_epoch: 1 # set eval_rollout_epoch > 0 when enable runner.only_eval or runner.val_check_interval > 0

  reward_type: action_level  # action_level or chunk_level
  logprob_type: token_level
  entropy_type: token_level

  adv_type: grpo
  loss_type: actor
  loss_agg_func: "token-mean"
  kl_beta: 0.0 # 系数为 0，KL 惩罚完全不生效
  # loss = loss - self.cfg.algorithm.entropy_bonus * entropy_loss
  entropy_bonus: 0 # fsdp_actor_worker.py 
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99 # not relevant for GRPO
  gae_lambda: 0.95 # not relevant for GRPO

  reward_coef: 5.0

  sampling_params:
    do_sample: True
    temperature_train: 1.6
    temperature_eval: 1.6
    top_k: -1 # 不限制候选 token 数量（不做 top-k 截断）
    top_p: 1.0 # 不做 nucleus sampling 截断（保留所有概率的 token）
    repetition_penalty: 1.0 # 不惩罚重复 token

  # length argument for autoregressive sampling
  # max length means max amount of tokens to generate
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

  filter_rewards: True
  rewards_lower_bound: 0.5
  rewards_upper_bound: 4.5
  # 流程是：

  # 每个环境的 128 步奖励求和 → 每个环境一个总分
  # 每组 8 个环境的总分取平均 → 每组一个均值
  # 组均值在 [0.5, 4.5] 范围内才保留，否则整组数据被 mask 掉
  # 为什么要过滤：

  # 均值太低（< 0.5）：这组环境几乎都失败了，组内 advantage 全接近 0（没有对比），学不到有用信号
  # 均值太高（> 4.5）：这组环境几乎都成功了，同样缺乏差异化，advantage 也接近 0

env:
  group_name: "EnvGroup"

  # Override the default values in env/libero_spatial
  train:
    total_num_envs: 64
    group_size: ${algorithm.group_size}
    max_episode_steps: 256 # max episode steps for truncation
    max_steps_per_rollout_epoch: 256
    reward_coef: ${algorithm.reward_coef}
    reset_gripper_open: False # 环境 reset 时不强制打开夹爪。如果设为 True，每次 reset 后会执行几步空动作把夹爪打开（gripper = -1），确保从一个干净的初始状态开始
    opensora_wm_hf_ckpt_path: "/path/to/model/RLinf-OpenSora-LIBERO-Spatial"
    enable_offload: True
    data_collection:
      enabled: True
      save_dir: ${runner.logger.log_path}/collected_data
      export_format: pickle
      only_success: False
  eval:
    total_num_envs: 500
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 512
    max_steps_per_rollout_epoch: 512
    group_size: 1
    reset_gripper_open: False 
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval
    enable_offload: True

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  enable_offload: True
  pipeline_stage_num: 1

  model:
    model_path: "/path/to/model/Openvla-oft-SFT-libero-spatial-traj1/" # https://huggingface.co/Haozhan72/Openvla-oft-SFT-libero-spatial-traj1
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32 # 做梯度累积
  global_batch_size: 8192 # 做梯度更新optimizer.step().这是上限，实际是 `num_env * rollout_epoch`
  seed: 1234
  enable_offload: True

  # Override the default values in model/openvla_oft
  model:
    model_path: "/path/to/model/Openvla-oft-SFT-libero-spatial-traj1/" # https://huggingface.co/Haozhan72/Openvla-oft-SFT-libero-spatial-traj1
    model_type: "openvla_oft"

    unnorm_key: libero_spatial_no_noops
    # LIBERO中的prompt格式
    # In: What action should the robot take to [task_description]?
    # Out:
    max_prompt_length: 128 

  optim:
    lr: 2.0e-5
    value_lr: 3.0e-3
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0

  # Override the default values in training_backend/fsdp
  fsdp_config:
    strategy: "fsdp"
    gradient_checkpointing: True
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False